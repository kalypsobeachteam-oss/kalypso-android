name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # Manuel çalıştırma butonu

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Gradle Wrapper indir
        run: |
          gradle wrapper --gradle-version=8.4 || true
          chmod +x ./gradlew

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Debug APK derle
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: Kalypso-Rezervasyon-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: APK boyutunu göster
        run: |
          echo "✅ APK hazır!"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
