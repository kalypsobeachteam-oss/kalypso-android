plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.kalypso.reservation'

    defaultConfig {
        applicationId "com.kalypso.reservation"
        minSdk 24          // Android 7.0+
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug  // debug key ile imzala — production için değiştir
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Sadece Android SDK — dış bağımlılık yok
}
